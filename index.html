<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Text Adventure</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        textarea { width: 100%; margin-bottom: 10px; }
        #story-log { height: 300px; }
        #output { border: 1px solid #ccc; padding: 10px; min-height: 200px; }
        .action-item { display: flex; margin-top: 10px; }
        .action-item span { flex-grow: 1; background: #f0f0f0; padding: 10px; border-radius: 5px; }
        .action-item button { margin-left: 10px; }
        #loading { color: red; }
    </style>
</head>
<body>
    <h1>AI Text Adventure</h1>
    
    <label for="character-info">Character Information:</label>
    <textarea id="character-info" rows="4" placeholder="Enter character details..."></textarea>

    <label for="setting">Setting:</label>
    <textarea id="setting-info" rows="4" placeholder="enter current setting"></textarea>
    
    <label for="narrative-style">Narrative Style Guidance:</label>
    <textarea id="narrative-style" rows="2" placeholder="e.g., Be descriptive and immersive."></textarea>
    
    <label for="extra-prompt">Additional Guidance Prompt:</label>
    <textarea id="extra-prompt" rows="2" placeholder="e.g., Set in a fantasy world."></textarea>
    
    <label for="story-log">Full Story Log (Editable):</label>
    <textarea id="story-log" rows="10"></textarea>
    
 

    <button id="start-btn">Start/Regenerate</button>
    <button id="back-btn" disabled>Undo Last Action</button>
    <button id="start-over-btn" style="display:none;">Start Over</button>
    <div id="loading"></div>
    
    <div id="custom-action-ctn" style="margin-top:20px;">
        <input id="custom-action-input" placeholder="Type a custom action..." style="width:80%;">
        <button id="custom-action-btn">Do This</button>
    </div>
    
    <label for="summarized-log">Summarized Story Log (Editable):</label>
    <textarea id="summarized-log" rows="10"></textarea>

    <script>
        const storyLogEl = document.getElementById('story-log');
        const characterInfoEl = document.getElementById('character-info');
        const SettingE1 = document.getElementById('setting-info');
        const narrativeStyleEl = document.getElementById('narrative-style');
        const extraPromptEl = document.getElementById('extra-prompt');
        const outputEl = document.getElementById('output');
        const startBtn = document.getElementById('start-btn');
        const backBtn = document.getElementById('back-btn');
        const startOverBtn = document.getElementById('start-over-btn');
        const loadingEl = document.getElementById('loading');
        const customActionInput = document.getElementById('custom-action-input');
        const customActionBtn = document.getElementById('custom-action-btn');


        // Render initial if story log exists
        if (storyLogEl.value.trim()) renderCurrentSituation();


        async function generate(action = '', isCustom = false) {
            
            loadingEl.innerText = 'Generating...';
            startBtn.disabled = true;
            backBtn.disabled = true;

            const response = await fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    story_log: storyLogEl.value,
                    character_info: characterInfoEl.value,
                    setting_info: SettingE1.value,
                    narrative_style: narrativeStyleEl.value,
                    extra_prompt: extraPromptEl.value,
                    action: action,
                    is_custom: isCustom
                })
            });

            const data = await response.json();
            storyLogEl.value = data.story_log;
            saveToLocalStorage();
            renderCurrentSituation(data.current_situation, data.actions);
            loadingEl.innerText = '';
            startBtn.disabled = false;
            backBtn.disabled = false;
            startOverBtn.style.display = 'inline';
        }

        function renderCurrentSituation(currentSituation = '', actions = '') {
            if (!storyLogEl.value.trim()) {
                outputEl.innerHTML = '';
                return;
            }

            let situationText = currentSituation || storyLogEl.value.split('\n\n').pop().trim();
            outputEl.innerHTML = `<p>${situationText}</p>`;

            if (actions) {
                const actionLines = actions.split('\n').filter(l => l.trim().startsWith('Option '));
                actionLines.forEach(line => {
                    const actionText = line.replace(/Option \d: /, '').trim();
                    const div = document.createElement('div');
                    div.className = 'action-item';
                    div.innerHTML = `<span>${actionText}</span><button data-action="${actionText}">Do This</button>`;
                    div.querySelector('button').onclick = () => generate(actionText, false);
                    outputEl.appendChild(div);
                });
            }

            // Edit button for last paragraph
            const editBtn = document.createElement('button');
            editBtn.innerText = 'Edit Last Paragraph';
            editBtn.onclick = () => editLastParagraph();
            outputEl.appendChild(editBtn);
        }

        function editLastParagraph() {
            const parts = storyLogEl.value.split('\n\n');
            const lastPara = parts.pop();
            const textarea = document.createElement('textarea');
            textarea.value = lastPara;
            textarea.rows = 5;
            const saveBtn = document.createElement('button');
            saveBtn.innerText = 'Save';
            saveBtn.onclick = () => {
                parts.push(textarea.value);
                storyLogEl.value = parts.join('\n\n');
                saveToLocalStorage();
                renderCurrentSituation();
                textarea.remove();
                saveBtn.remove();
            };
            outputEl.appendChild(textarea);
            outputEl.appendChild(saveBtn);
        }

        startBtn.onclick = () => generate();
        customActionBtn.onclick = () => {
            const customAction = customActionInput.value.trim();
            if (customAction) {
                generate(customAction, true);
                customActionInput.value = '';
            }
        };
        backBtn.onclick = () => {
            const parts = storyLogEl.value.split(/\n\nPLAYER ACTION/);
            if (parts.length > 1) {
                storyLogEl.value = parts.slice(0, -1).join('\n\nPLAYER ACTION').trim();
                saveToLocalStorage();
                renderCurrentSituation();
            }
        };
        startOverBtn.onclick = () => {
            storyLogEl.value = '';
            saveToLocalStorage();
            outputEl.innerHTML = '';
            startOverBtn.style.display = 'none';
        };

        // Allow editing story log directly and re-render
        storyLogEl.onchange = () => {
            saveToLocalStorage();
            renderCurrentSituation();
        };
    </script>
</body>
</html>
